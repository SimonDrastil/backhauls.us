version: "3.9"
services:
  web:
    build: .
    image: backhauls-us-web
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/backhauls
      - DIRECT_URL=postgresql://postgres:postgres@db:5432/backhauls
      - REDIS_URL=redis://cache:6379
      - NEXTAUTH_SECRET=development
      - NEXT_PUBLIC_APP_URL=http://localhost:3000
    depends_on:
      - db
      - cache
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: backhauls
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
  cache:
    image: redis:7-alpine
    ports:
      - "6379:6379"
volumes:
  pgdata:
